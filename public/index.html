<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' ws: wss:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Tap Championship</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        #selection, #game, #leaderboard { background: #1e293b; padding: 25px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; max-height: 400px; overflow-y: auto; padding: 10px; }
        .country-btn { padding: 10px; background: #334155; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .country-btn:hover { background: #38bdf8; }
        #tapButton { width: 180px; height: 180px; border-radius: 50%; font-size: 28px; font-weight: bold; background: #22c55e; border: 6px solid #14532d; color: white; cursor: pointer; margin: 20px 0; box-shadow: 0 8px 0 #14532d; }
        #tapButton:active { transform: translateY(4px); box-shadow: 0 4px 0 #14532d; }
        .counter { font-size: 32px; color: #f87171; font-weight: bold; margin: 15px 0; }
        #ranking { list-style: none; padding: 0; }
        #ranking li { padding: 12px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        .progress-text { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 World Tap Championship</h1>

    <div id="selection">
        <h2>Scegli la tua Nazione</h2>
        <p>La scelta è definitiva per questo campionato.</p>
        <div id="countries" class="country-grid">Caricamento nazioni...</div>
    </div>

    <div id="game" style="display:none;">
        <h2 id="chosenCountryTitle"></h2>
        <div class="counter">RIMANENTI: <span id="counterValue">Attendi...</span></div>
        <button id="tapButton">TAP!</button>
    </div>

    <div id="leaderboard">
        <h2>🏆 Classifica Mondiale (Top 10)</h2>
        <ul id="ranking"></ul>
    </div>
</div>

<script>
    const SERVER_URL = window.location.origin.replace(/^http/, 'ws');
    let socket;
    let myCountry = localStorage.getItem("chosenCountry");

    function init() {
        socket = new WebSocket(SERVER_URL);

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === "initData") {
                renderCountries(data.countries);
                renderLeaderboard(data.ranking);
                if (myCountry) showGame();
            }

            if (data.type === "update") {
                renderLeaderboard(data.ranking);
                if (data.countryName === myCountry) {
                    document.getElementById("counterValue").textContent = data.newRemaining.toLocaleString();
                }
            }

            if (data.type === "winner") {
                alert("IL CAMPIONATO È FINITO! Ha vinto: " + data.country);
                localStorage.removeItem("chosenCountry");
                location.reload();
            }
        };

        socket.onclose = () => setTimeout(init, 2000); // Riconnessione automatica
    }

    function renderCountries(list) {
        const container = document.getElementById("countries");
        container.innerHTML = "";
        list.forEach(c => {
            const b = document.createElement("button");
            b.className = "country-btn";
            b.textContent = c.name;
            b.onclick = () => selectCountry(c.name);
            container.appendChild(b);
        });
    }

    function selectCountry(name) {
        myCountry = name;
        localStorage.setItem("chosenCountry", name);
        socket.send(JSON.stringify({ type: "selectCountry", country: name }));
        showGame();
    }

    function showGame() {
        document.getElementById("selection").style.display = "none";
        document.getElementById("game").style.display = "block";
        document.getElementById("chosenCountryTitle").textContent = "Gareggi per: " + myCountry;
    }

    function renderLeaderboard(ranking) {
        const list = document.getElementById("ranking");
        list.innerHTML = "";
        ranking.forEach((item, i) => {
            const li = document.createElement("li");
            li.innerHTML = `<span>${i+1}. ${item.country}</span> <span class="progress-text">${item.progress}%</span>`;
            list.appendChild(li);
        });
    }

    document.getElementById("tapButton").onclick = () => {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: "tap", country: myCountry }));
        }
    };

    init();
</script>
</body>
</html>
