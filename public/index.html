<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Tap Championship</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        h1 { color: #38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.5); }
        #selection, #game { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-top: 20px; }
        .country-btn { margin: 5px; padding: 12px 18px; font-size: 14px; cursor: pointer; border: none; border-radius: 8px; background: #334155; color: white; transition: 0.3s; }
        .country-btn:hover { background: #38bdf8; }
        #tapButton { width: 200px; height: 200px; border-radius: 50%; font-size: 32px; font-weight: bold; background: linear-gradient(145deg, #22c55e, #16a34a); border: 8px solid #14532d; color: white; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 0 #14532d; active: transform: translateY(5px); active: box-shadow: 0 5px 0 #14532d; }
        .counter { font-size: 42px; font-weight: bold; color: #f87171; margin: 20px 0; font-family: 'Courier New', monospace; }
        #leaderboard { margin-top: 40px; background: #1e293b; padding: 20px; border-radius: 15px; }
        #ranking { list-style: none; padding: 0; text-align: left; }
        #ranking li { padding: 10px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 World Tap Championship</h1>

    <div id="selection">
        <h2>Scegli il tuo paese</h2>
        <p>Attenzione: la scelta è definitiva per questo campionato!</p>
        <div id="countries">Caricamento nazioni...</div>
    </div>

    <div id="game" style="display:none;">
        <h2 id="chosenCountry"></h2>
        <div class="counter">
            RIMANENTI: <span id="counterValue">--</span>
        </div>
        <button id="tapButton">TAP!</button>
    </div>

    <div id="leaderboard">
        <h2>🏆 Classifica Mondiale (Tap Rimanenti)</h2>
        <ul id="ranking"></ul>
    </div>
</div>

<script>
const SERVER_URL = window.location.origin.replace(/^http/, 'ws');
let socket;
let selectedCountry = localStorage.getItem("chosenCountry");

function connect() {
    socket = new WebSocket(SERVER_URL);

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "initData") {
            renderCountries(data.countries);
            renderLeaderboard(data.ranking);
        }

        if (data.type === "update") {
            renderLeaderboard(data.ranking);
            // Aggiorna il numero rimanente solo se è il mio paese
            if (selectedCountry === data.countryName) {
                document.getElementById("counterValue").textContent = data.newRemaining.toLocaleString();
            }
        }

        if (data.type === "winner") {
            alert("🏆 IL CAMPIONATO È FINITO! Vincitore: " + data.country);
            localStorage.removeItem("chosenCountry");
            location.reload();
        }
    };
}

function renderLeaderboard(ranking) {
    const list = document.getElementById("ranking");
    list.innerHTML = "";
    // Mostriamo solo i primi 10 per aumentare la competizione
    ranking.slice(0, 10).forEach((item, index) => {
        const li = document.createElement("li");
        li.style.background = index === 0 ? "rgba(234, 179, 8, 0.2)" : "transparent";
        li.innerHTML = `
            <span>${index + 1}. ${item.country}</span> 
            <span style="color: #38bdf8">${item.progress}% completato</span>
        `;
        list.appendChild(li);
    });
}

// ... (le altre funzioni selectCountry, startGame, renderCountries rimangono identiche)
</script>
</body>
</html>
